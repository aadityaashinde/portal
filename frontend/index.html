<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Matrix | Digital Portal Access</title>
    <meta name="description" content="Secure digital access portal - The Matrix Style.">
    <!-- Meta tags for SEO and Social Media -->
    <meta property="og:title" content="The Matrix | Secure Access">
    <meta property="og:description" content="Enter the digital realm with our Matrix-themed secure login.">
    <meta property="og:image" content="images/matrix-logo.png">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=JetBrains+Mono:wght@300;500;700&display=swap"
        rel="stylesheet">

    <!-- Local Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/matrix-logo.png">
</head>

<body>
    <!-- Matrix Rain Canvas Background -->
    <canvas id="matrix-rain"></canvas>

    <!-- Parallax Container for Mouse Responsiveness -->
    <div id="parallax-container">
        <div class="login-card" id="login-card">
            <div class="header">
                <div class="logo-container">
                    <img src="images/matrix-logo.png" alt="Matrix Logo" id="matrix-logo" class="glitch-logo">
                </div>
                <h1 id="portal-title">SYSTEM ACCESS</h1>
                <p class="subtitle">Enter your credentials to decode the stream.</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label for="name">IDENTITY NAME</label>
                    <input type="text" id="name" name="name" placeholder="Agent Smith" required>
                    <span class="focus-border"></span>
                </div>

                <div class="input-group">
                    <label for="role">CLASSIFICATION</label>
                    <div class="select-wrapper">
                        <select id="role" name="role" required>
                            <option value="" disabled selected>Select your status...</option>
                            <option value="recruiter">Recruiter</option>
                            <option value="engineer">Hiring Engineer</option>
                            <option value="client">Client/Business</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">SECURE COMMS (EMAIL)</label>
                    <input type="email" id="email" name="email" placeholder="neo@neb.io" required>
                    <span class="focus-border"></span>
                </div>

                <button type="submit" id="google-signin" class="google-btn disabled">
                    <div class="google-icon-wrapper">
                        <svg viewBox="0 0 24 24" class="google-icon">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                    </div>
                    <span class="btn-text">SIGN IN WITH GOOGLE</span>
                </button>
            </form>

            <div id="status-message" class="hidden"></div>
        </div>
    </div>

    <!-- Mouse Trail Follower -->
    <div id="cursor-glow"></div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
