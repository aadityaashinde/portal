services:
  db:
    image: postgres:16-alpine
    container_name: portal_db
    environment:
      POSTGRES_DB: project0
      POSTGRES_USER: project0_user
      POSTGRES_PASSWORD: project0_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U project0_user -d project0" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: portal_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: portal_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  adminer:
    image: adminer
    container_name: portal_adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  postgres_data:
